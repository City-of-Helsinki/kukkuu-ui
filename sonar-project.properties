# Base SonarQube configuration for City of Helsinki Frontend projects
sonar.projectKey = City-of-Helsinki_kukkuu-ui
sonar.organization = city-of-helsinki
sonar.javascript.lcov.reportPaths = ./coverage/lcov.info
sonar.sourceEncoding = UTF-8
sonar.sources = src

# kukkuu-ui specific
sonar.javascript.node.maxspace = 8192

sonar.exclusions = \
  **/__mocks__/**/*, \
  **/__snapshots__/*, \
  **/*.d.ts, \
  src/setupTests.js, \
  src/setupTests.ts, \
  src/domain/api/generatedTypes/**, \
  **/__generated__.ts

sonar.test.inclusions = \
  **/__tests__/**/*,  \
  **/*.test.js, \
  **/*.test.ts, \
  **/*.test.jsx, \
  **/*.test.tsx

sonar.coverage.exclusions = \
  src/index.tsx, \
  src/test/**, \
  **/types/**, \
  src/domain/profile/children/child/types.ts, \
  src/domain/event/types.ts, \
  src/domain/event/enrol/EnrolConstants.ts, \
  src/domain/child/mutation/ChildMutation.ts, \
  src/domain/app/notification/cmsNotificationQuery.ts, \
  src/common/components/formikWrappers/types.ts, \
  src/common/translation/i18n/i18nInit.ts, \
  **/*.scss, \
  **/mutations/**, \
  **/queries/**
